# ─────────────────────────────────────────────
# Decap CMS — Sourcier Québec
# Auth via DecapBridge (PKCE)
# ─────────────────────────────────────────────

backend:
  name: git-gateway
  repo: sourcierquebec/sourcier-quebec
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/01dd29e0-54df-440b-9965-b746c1b4e770/pkce
  auth_token_endpoint: /sites/01dd29e0-54df-440b-9965-b746c1b4e770/token
  gateway_url: https://gateway.decapbridge.com
  commit_messages:
    create: 'Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    update: 'Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    delete: 'Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    uploadMedia: 'Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    deleteMedia: 'Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    openAuthoring: 'Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge'

auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

logo_url: https://decapbridge.com/decapcms-with-bridge.svg
site_url: https://sourcierquebec.ca

locale: fr
media_folder: public/images
public_folder: /images

slug:
  encoding: ascii
  clean_accents: true

collections:
  # ── Informations générales ──────────────────
  - name: general
    label: "Informations générales"
    files:
      - name: general
        label: "Site & Héro"
        file: src/content/general.yml
        fields:
          - { label: "Nom du site", name: brand, widget: string }
          - { label: "Sous-titre", name: baseline, widget: string }
          - { label: "URL Facebook", name: facebookUrl, widget: string }
          - label: "Clause de confidentialité (formulaire)"
            name: confidentialiteForm
            widget: text
          - label: "Section héro"
            name: hero
            widget: object
            fields:
              - label: "Slogan — ligne 1"
                name: sloganHaut
                widget: string
                hint: "Première ligne du grand titre d'accueil (ex. « Sous vos pieds, »)."
              - label: "Slogan — ligne 2 (affichée en italique)"
                name: sloganBas
                widget: string
                hint: "Seconde ligne du grand titre, mise en évidence en italique (ex. « l'eau attend. »)."
              - { label: "Accroche", name: accroche, widget: text }
              - { label: "Texte du bouton", name: ctaLabel, widget: string }
          - label: "Mentions légales"
            name: legal
            widget: object
            fields:
              - { label: "Clause de non-garantie", name: clause, widget: text }

  # ── Piliers ─────────────────────────────────
  - name: piliers
    label: "Les 3 piliers"
    files:
      - name: piliers
        label: "Piliers de la démarche"
        file: src/content/piliers.yml
        fields:
          - label: "Piliers"
            name: piliers
            widget: list
            max: 3
            min: 3
            fields:
              - { label: "Titre", name: titre, widget: string }
              - { label: "Description", name: texte, widget: text }

  # ── À propos ────────────────────────────────
  - name: apropos
    label: "À propos"
    files:
      - name: apropos
        label: "Présentation de Thomas"
        file: src/content/apropos.yml
        fields:
          - { label: "Introduction", name: intro, widget: text }
          - { label: "Parcours", name: parcours, widget: text }
          - { label: "Méthode de travail", name: methode, widget: text }
          - label: "Points forts"
            name: points
            widget: list
            fields:
              - { label: "Titre", name: titre, widget: string }
              - { label: "Description", name: texte, widget: text }

  # ── Forfaits ────────────────────────────────
  - name: forfaits
    label: "Forfaits & Tarifs"
    files:
      - name: forfaits
        label: "Grille tarifaire"
        file: src/content/forfaits.yml
        fields:
          - label: "Forfaits"
            name: forfaits
            widget: list
            fields:
              - { label: "Identifiant", name: id, widget: hidden }
              - { label: "Nom du forfait", name: nom, widget: string }
              - { label: "Prix ($)", name: prix, widget: number, value_type: int }
              - { label: "Surface couverte", name: surface, widget: string }
              - { label: "Public cible", name: cible, widget: text }
              - label: "Inclusions"
                name: inclusions
                widget: list
                field: { label: "Inclusion", name: item, widget: string }

  # ── Zone d'intervention ─────────────────────
  - name: zone
    label: "Zone d'intervention"
    files:
      - name: zone
        label: "Territoire desservi"
        file: src/content/zone.yml
        fields:
          - { label: "Ville de base", name: base, widget: string }
          - { label: "Coordonnées GPS", name: coords, widget: string }
          - label: "Régions desservies"
            name: regions
            widget: list
            field: { label: "Région", name: region, widget: string }
          - { label: "Note déplacement", name: autre, widget: string }
          - { label: "Rayon inclus", name: rayonInclus, widget: string }
          - { label: "Tarif kilométrique", name: tarifKm, widget: string }
          - { label: "Note sur les prix", name: note, widget: text }

  # ── FAQ ─────────────────────────────────────
  - name: faq
    label: "Questions fréquentes"
    files:
      - name: faq
        label: "FAQ"
        file: src/content/faq.yml
        fields:
          - label: "Questions"
            name: faq
            widget: list
            fields:
              - { label: "Question", name: question, widget: string }
              - { label: "Réponse", name: reponse, widget: text }

  # ── Témoignages ─────────────────────────────
  - name: temoignages
    label: "Témoignages"
    files:
      - name: temoignages
        label: "Avis clients"
        file: src/content/temoignages.yml
        fields:
          - { label: "Texte d'introduction", name: intro, widget: text }
          - label: "Témoignages"
            name: temoignages
            widget: list
            fields:
              - { label: "Nom / type de client", name: auteur, widget: string }
              - { label: "Témoignage", name: texte, widget: text }

  # ── Coordonnées ─────────────────────────────
  - name: contact
    label: "Coordonnées"
    files:
      - name: contact
        label: "Informations de contact"
        file: src/content/contact.yml
        fields:
          - { label: "Adresse", name: adresse, widget: string }
          - { label: "Téléphone (affiché)", name: tel, widget: string }
          - { label: "Téléphone (lien tel:)", name: telRaw, widget: string }
          - { label: "Courriel", name: email, widget: string }
          - { label: "Horaires", name: horaires, widget: string }
          - { label: "Introduction du formulaire", name: formIntro, widget: text }
