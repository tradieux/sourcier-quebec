intro: >-
  Les témoignages proviennent directement des avis laissés sur la fiche Google
  Business Profile de Sourcier Québec.

temoignages:
  - auteur: Client résidentiel
    texte: >-
      Travail sérieux et méthodique. Le point de forage suggéré s'est avéré
      exact — débit au rendez-vous.

  - auteur: Exploitation agricole
    texte: >-
      Grâce à l'intervention préalable, nous avons évité un forage à sec.
      Approche rigoureuse et rapport clair.

  - auteur: Projet municipal
    texte: >-
      Un allié précieux avant d'engager les équipements lourds. Recommandation
      sans réserve.
