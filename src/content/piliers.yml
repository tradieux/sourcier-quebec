piliers:
  - titre: La Précision
    texte: >-
      Déterminer le point de forage exact sur votre propriété. Mon expertise
      permet de cibler l'endroit le plus pertinent qui répond spécifiquement à
      vos besoins en eau.

  - titre: "L'Économie"
    texte: >-
      Un sourcier vous fait économiser des milliers de dollars. En évitant les
      forages infructueux, les suppléments de creusement inutiles ou pire
      encore les trous secs. Vous optimisez votre investissement dès le premier
      mètre.

  - titre: "L'Aide à la décision"
    texte: >-
      Obtenez un portrait concret de votre sous-sol et, grâce à mon analyse,
      décidez avec confiance s'il est opportun d'entreprendre un forage et si
      le projet répond à vos attentes de débit.
