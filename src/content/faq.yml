faq:
  - question: "Est-ce un don ou une technique ?"
    reponse: >-
      Il s'agit d'une sensibilité développée et d'une technique de détection
      des variations géophysiques du sol. C'est une expertise qui s'affine avec
      les années de pratique.

  - question: "Pourquoi faire appel à un sourcier avant le foreur ?"
    reponse: >-
      Faire appel à un sourcier en amont d'un forage permet d'obtenir une
      orientation supplémentaire dans la recherche d'eau avant d'engager des
      travaux plus coûteux. Le sourcier intervient pour identifier des zones
      potentielles d'eau souterraine. Le sourcier ne remplace pas le foreur ni
      les méthodes techniques, mais agit comme un outil d'aide à la décision en
      amont du projet.

  - question: "Respectez-vous les distances légales ?"
    reponse: >-
      Oui, ma recherche tient compte des règlements municipaux (distances par
      rapport aux installations septiques, limites de terrain, etc.).

  - question: "Que contient le rapport final ?"
    reponse: >-
      Le point précis de forage, un croquis de la prospection, une estimation
      de la profondeur de la veine d'eau et une évaluation du débit.
