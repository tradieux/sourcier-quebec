intro: >-
  Je propose la détection précise des ressources en eau du sous-sol pour les
  particuliers, agriculteurs et professionnels du forage.

parcours: >-
  Sourcier professionnel formé en France, je mets une décennie d'expérience en
  tant que passionné de la sourcellerie au service de la détection de vos
  ressources souterraines.

methode: >-
  Mon travail consiste à localiser avec précision les veines d'eau, à en
  déterminer la profondeur et le débit potentiel. Alliant une sensibilité
  affinée à une méthodologie rigoureuse, j'accompagne mes clients dans la
  réussite de leurs projets de forage, en apportant une réponse claire et
  fiable avant chaque intervention.

points:
  - titre: Expérience
    texte: >-
      Plus de 10 ans de pratique dans le domaine de la détection d'eau.
      Formation certifiante de sourcier professionnel en France.

  - titre: Engagement
    texte: >-
      Une démarche rigoureuse qui respecte vos critères (débit, emplacement)
      tout en se conformant aux règlements municipaux en vigueur.

  - titre: Rapport détaillé
    texte: >-
      À la fin de chaque intervention, je vous fournis un rapport complet. Ce
      document professionnel peut être transmis directement à votre foreur pour
      guider ses travaux.
